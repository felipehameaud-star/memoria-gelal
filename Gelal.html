<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria Gelal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #fde8d8 0%, #f9c9a8 50%, #f5a87a 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .header { text-align: center; margin-bottom: 14px; }
  .tagline {
    font-size: 0.68em; font-weight: 900; letter-spacing: 3px;
    color: #c0552a; text-transform: uppercase; margin-top: 3px;
  }
  .stats {
    display: flex; gap: 24px; margin-bottom: 16px;
    background: rgba(255,255,255,0.55);
    padding: 9px 28px; border-radius: 30px;
    font-size: 0.95em; font-weight: 700; color: #7a3020;
    box-shadow: 0 2px 10px rgba(200,100,60,0.15);
  }
  .stats span { color: #e8472a; font-size: 1.15em; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 11px; max-width: 430px; width: 100%;
  }
  .card { aspect-ratio: 0.72; cursor: pointer; perspective: 700px; border-radius: 14px; }
  .card-inner {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.45s ease; border-radius: 14px;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(150,60,20,0.22);
  }
  .card-front {
    background: linear-gradient(160deg, #fde8d8, #f9c5a0);
    border: 2.5px solid #f0a070;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(160deg, #fffdf9, #fff3ea);
    transform: rotateY(180deg);
    border: 2.5px solid #f0b080;
    font-size: 2.4em;
  }
  .card.matched .card-back {
    background: linear-gradient(160deg, #d4f5e2, #b8edcc);
    border: 2.5px solid #3db86a;
    animation: pop 0.3s ease;
  }
  @keyframes pop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.13); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .card:hover:not(.flipped):not(.matched) .card-inner {
    transform: rotateY(12deg) scale(1.04);
  }
  .btn {
    margin-top: 18px; padding: 12px 38px;
    background: linear-gradient(135deg, #e8472a, #f7941d);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 1em; font-weight: 900; letter-spacing: 1px;
    border: none; border-radius: 30px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,71,42,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(232,71,42,0.5); }
  .win-msg {
    display: none; text-align: center; margin-top: 14px;
    font-size: 1.2em; font-weight: 900; color: #7a3020;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);} }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 220 80" width="220" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#d42b1a"/>
        <stop offset="40%"  stop-color="#f7941d"/>
        <stop offset="100%" stop-color="#f5d020"/>
      </linearGradient>
      <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000033"/></filter>
    </defs>
    <g transform="translate(8,8)">
      <path d="M4,38 Q22,2 42,38"  fill="none" stroke="#d42b1a" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M9,38 Q22,8 36,38"  fill="none" stroke="#f7941d" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M14,38 Q22,14 31,38" fill="none" stroke="#f5d020" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M18,38 Q22,18 27,38" fill="none" stroke="#5cb85c"  stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="60" y="58" font-family="'Dancing Script',cursive" font-size="58" font-weight="700"
          fill="url(#gG)" filter="url(#sh)" letter-spacing="-1">Gelal</text>
    <text x="198" y="22" font-family="Arial" font-size="13" fill="#d42b1a" font-weight="bold">®</text>
  </svg>
  <div class="tagline">Juego de Memoria</div>
</div>

<div class="stats">
  Intentos: <span id="moves">0</span> &nbsp;|&nbsp; Pares: <span id="pairs">0</span>/8
</div>

<div class="grid" id="grid"></div>

<div class="win-msg" id="winMsg">
  🎉 ¡Neutralizaste la acidez! Terminaste en <span id="finalMoves"></span> intentos.
</div>

<button class="btn" onclick="initGame()">🔄 Nueva Partida</button>

<script>
const emojis = ['🍋','🌶️','🍊','☕','🍇','🧅','🍅','🫙'];

const bottleSVG = `<svg width="65%" viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0e0d0"/><stop offset="50%" stop-color="#faf4ee"/><stop offset="100%" stop-color="#e8d0be"/>
    </linearGradient>
    <linearGradient id="lG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd5b0"/><stop offset="100%" stop-color="#f5a870"/>
    </linearGradient>
    <linearGradient id="tG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d42b1a"/><stop offset="50%" stop-color="#f7941d"/><stop offset="100%" stop-color="#f5d020"/>
    </linearGradient>
  </defs>
  <rect x="38" y="4" width="24" height="18" rx="5" fill="#e0e0e0" stroke="#bbb" stroke-width="1.2"/>
  <rect x="34" y="20" width="32" height="14" rx="4" fill="#ececec" stroke="#ccc" stroke-width="1"/>
  <path d="M22,34 Q18,60 18,90 Q18,148 50,150 Q82,148 82,90 Q82,60 78,34 Z" fill="url(#bG)" stroke="#d4956a" stroke-width="1.5"/>
  <path d="M24,60 Q22,90 22,108 Q22,130 50,132 Q78,130 78,108 Q78,90 76,60 Z" fill="url(#lG)" opacity="0.95"/>
  <path d="M36,76 Q50,60 64,76" fill="none" stroke="#d42b1a" stroke-width="3" stroke-linecap="round"/>
  <path d="M38,76 Q50,64 62,76" fill="none" stroke="#f7941d" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M41,76 Q50,68 59,76" fill="none" stroke="#f5d020" stroke-width="2" stroke-linecap="round"/>
  <text x="50" y="95" text-anchor="middle" font-family="'Dancing Script',Georgia,cursive" font-size="13" font-weight="bold" fill="url(#tG)">Gelal</text>
  <text x="50" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#7a3020">NEUTRALIZANTE</text>
  <text x="50" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#7a3020">ANTIÁCIDO</text>
  <ellipse cx="32" cy="80" rx="4" ry="22" fill="white" opacity="0.18" transform="rotate(-8,32,80)"/>
</svg>`;

let flipped=[], matched=0, moves=0, lock=false;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function initGame(){
  const deck=shuffle([...emojis,...emojis]);
  flipped=[];matched=0;moves=0;lock=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('winMsg').style.display='none';
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  deck.forEach((emoji)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.emoji=emoji;
    card.innerHTML=`<div class="card-inner">
      <div class="card-front">${bottleSVG}</div>
      <div class="card-back">${emoji}</div>
    </div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card){
  if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    lock=true;moves++;
    document.getElementById('moves').textContent=moves;
    const[a,b]=flipped;
    if(a.dataset.emoji===b.dataset.emoji){
      a.classList.add('matched');b.classList.add('matched');
      matched++;document.getElementById('pairs').textContent=matched;
      flipped=[];lock=false;
      if(matched===8){
        document.getElementById('finalMoves').textContent=moves;
        document.getElementById('winMsg').style.display='block';
      }
    }else{
      setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];lock=false;},900);
    }
  }
}

initGame();
</script>
</body>
</html>
